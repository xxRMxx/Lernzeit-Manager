version: '3.8'
services:
  backend:
    # 1. Wir nutzen ein fertiges Python-Image, da der Code live vom Server gelesen wird
    image: python:3.12-slim
    working_dir: /app
    environment:
      - PYTHONUNBUFFERED=1
      - 'DEBUG=${DEBUG:-true}'
      - 'SECRET_KEY=${SECRET_KEY}'
      - 'ALLOWED_HOSTS=${ALLOWED_HOSTS}'
      - 'CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}'
    volumes:
      # 2. ÄNDERUNG: Hier binden wir deinen Live-Ordner auf dem Server ein
      - /root/lernzeit-manager/backend:/app
      - 'sqlite_data:/app/db_prod'
    # 3. ÄNDERUNG: Wir installieren die requirements vor dem Start live mit
    command: >
      bash -c "pip install --no-cache-dir -r requirements.txt &&
               python manage.py makemigrations &&
               python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    labels:
      - coolify.managed=true
      - coolify.zodiac.path=/
      - coolify.zodiac.port=8000
  frontend:
    # 4. Wir nutzen ein fertiges Node-Image für den Vite-Dev-Modus
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    environment:
      - 'VITE_API_URL=${VITE_API_URL}'
    volumes:
      # 5. ÄNDERUNG: Auch das Frontend wird live gespiegelt
      - /root/lernzeit-manager/frontend:/app
    # 6. ÄNDERUNG: NPM-Pakete installieren und Vite-Server starten
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0"
    labels:
      - coolify.managed=true
      - coolify.zodiac.path=/
      - coolify.zodiac.port=5173
volumes:
  sqlite_data: null
