version: '3.8'
services:
  backend:
    image: 'python:3.12-slim'
    working_dir: /app
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
      - 'DEBUG=${DEBUG:-true}'
      - 'SECRET_KEY=${SECRET_KEY}'
      - 'ALLOWED_HOSTS=${ALLOWED_HOSTS}'
      - 'CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}'
    volumes:
      - '/home/raphael/Development/Repositories/Lernzeit-Manager/backend:/app'
      - 'sqlite_data:/app/db_prod'
    command: "bash -c \"pip install --no-cache-dir -r requirements.txt &&\n         python manage.py makemigrations &&\n         python manage.py migrate &&\n         python manage.py runserver 0.0.0.0:8000\"\n"
    labels:
      - coolify.managed=true
      - coolify.zodiac.path=/
      - coolify.zodiac.port=8000

  frontend:
    image: 'node:20-alpine'
    working_dir: /app
    expose:
      - "5173"
    depends_on:
      - backend
    environment:
      - 'VITE_API_URL=${VITE_API_URL}'
    volumes:
      - '/home/raphael/Development/Repositories/Lernzeit-Manager/frontend:/app'
    command: "sh -c \"npm install &&\n       npm run dev -- --host 0.0.0.0\"\n"
    labels:
      - coolify.managed=true
      - coolify.zodiac.path=/
      - coolify.zodiac.port=5173

volumes:
  sqlite_data: null
